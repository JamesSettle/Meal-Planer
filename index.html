<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Meal Planner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#F7F5F0;--card:#fff;--accent:#2D5A27;--accent-dark:#1F3F1B;--text:#1A1A1A;--muted:#888;
  --border:#E5E2DB;--done:#B0ADA8;--pill-bg:#E8F2E7;--pill-text:#2D5A27;
  --recent-bg:#FFF8E8;--recent-border:#F0C84A;--done-bg:#F0F7EE;
  --tonight-bg:#1F3F1B;--tonight-text:#F7F5F0;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;-webkit-font-smoothing:antialiased;}

header{background:var(--accent);padding:20px 18px 14px;position:sticky;top:0;z-index:20;}
header h1{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;font-weight:400;letter-spacing:-0.01em;}
header p{font-size:11px;color:rgba(255,255,255,0.6);margin-top:1px;}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:10px;}
.gen-btn{background:#fff;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;-webkit-appearance:none;white-space:nowrap;}
.gen-btn:active{background:#E8F2E7;}
.week-label{font-size:11px;color:rgba(255,255,255,0.75);font-weight:500;}

.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:79px;z-index:15;}
.tab{flex:1;padding:13px 0;font-size:12px;font-weight:600;color:var(--muted);text-align:center;cursor:pointer;border-bottom:2px solid transparent;letter-spacing:0.02em;text-transform:uppercase;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.panel{display:none;}.panel.active{display:block;}

.tonight-hero{background:var(--tonight-bg);color:var(--tonight-text);margin:14px 14px 0;border-radius:14px;overflow:hidden;position:relative;}
.tonight-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 85% 15%,rgba(240,200,74,0.15),transparent 50%);pointer-events:none;}
.tonight-inner{padding:22px 20px 20px;position:relative;}
.tonight-day{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.15em;color:rgba(247,245,240,0.6);margin-bottom:8px;}
.tonight-meal{font-family:'DM Serif Display',serif;font-size:28px;line-height:1.15;font-weight:400;letter-spacing:-0.01em;margin-bottom:12px;}
.tonight-tag{display:inline-block;font-size:10px;padding:3px 10px;border-radius:20px;background:rgba(247,245,240,0.15);color:var(--tonight-text);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;}
.tonight-actions{display:flex;gap:8px;margin-top:18px;}
.tonight-btn{flex:1;background:rgba(247,245,240,0.1);color:var(--tonight-text);border:1px solid rgba(247,245,240,0.2);padding:10px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;-webkit-appearance:none;}
.tonight-btn:active{background:rgba(247,245,240,0.2);}
.tonight-btn.primary{background:#F0C84A;color:var(--accent-dark);border-color:#F0C84A;}
.tonight-btn.primary:active{background:#E0B83A;}

.tonight-ingredients{background:var(--card);margin:14px;border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
.tonight-ing-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:10px;}
.ing-list{font-size:13px;line-height:1.7;color:var(--text);}
.ing-list li{list-style:none;padding:2px 0;display:flex;gap:8px;align-items:baseline;}
.ing-list li::before{content:"•";color:var(--accent);font-weight:700;}

.up-next{margin:14px;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;}
.up-next-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;}
.up-next-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;}
.up-next-row + .up-next-row{border-top:1px solid var(--border);margin-top:2px;padding-top:10px;}
.up-next-day{font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.05em;min-width:38px;}
.up-next-name{flex:1;margin:0 10px;}

.days{padding:14px 16px 0;}
.cluster-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;padding:10px 0 6px;}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.day-card.done{background:var(--done-bg);border-color:#C8DFC4;}
.day-card.today{border-color:var(--accent);border-width:2px;background:#F7FBF6;}
.day-card.skipped{background:#F5F2EC;border-style:dashed;}
.day-card.skipped .day-meal{color:var(--muted);text-decoration:line-through;font-style:italic;}
.day-card.pinned{border-color:#F0C84A;background:#FFFCF2;}
.day-action.pinned-btn{background:#F0C84A;border-color:#F0C84A;color:var(--accent-dark);}
.pin-badge{font-size:11px;color:#B8860B;}
.day-label{font-size:10px;font-weight:700;color:var(--muted);min-width:34px;text-transform:uppercase;letter-spacing:0.05em;}
.day-card.today .day-label{color:var(--accent);}
.day-meal{font-size:14px;font-weight:500;color:var(--text);flex:1;line-height:1.3;}
.day-card.done .day-meal{color:var(--done);text-decoration:line-through;}
.day-action{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;padding:4px 9px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.day-action:active{background:var(--bg);}
.day-action.done-btn{color:var(--accent);border-color:var(--accent);}
.done-badge{font-size:9px;padding:2px 7px;border-radius:20px;background:#C8DFC4;color:#2D5A27;white-space:nowrap;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;}
.today-badge{font-size:9px;padding:2px 7px;border-radius:20px;background:var(--accent);color:#fff;white-space:nowrap;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;}
.info-bar{margin:14px 16px 0;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.info-bar p{font-size:12px;color:var(--muted);line-height:1.5;}
.info-bar strong{color:var(--text);}

.shop-header{padding:16px 16px 0;}
.shop-progress-wrap{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.shop-progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.shop-progress-label{font-size:13px;font-weight:600;}
.shop-progress-pct{font-size:12px;color:var(--muted);}
.shop-progress-bar-wrap{background:var(--bg);border-radius:10px;height:6px;overflow:hidden;}
.shop-progress-bar{height:100%;background:var(--accent);border-radius:10px;transition:width 0.3s ease;width:0%;}
.shop-reset{margin-top:10px;font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline;padding:0;}
.shop-section{margin:0 16px 12px;}
.shop-section-header{font-size:10px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:0.08em;padding:7px 12px;border-radius:8px 8px 0 0;background:var(--accent);}
.shop-section-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}
.shop-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;gap:12px;user-select:none;-webkit-user-select:none;}
.shop-row:last-child{border-bottom:none;}
.shop-row:active{background:var(--bg);}
.shop-box{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;background:#fff;}
.shop-row.checked .shop-box{background:var(--accent);border-color:var(--accent);}
.shop-tick{width:12px;height:12px;display:none;}
.shop-row.checked .shop-box .shop-tick{display:block;}
.shop-item-body{flex:1;min-width:0;}
.shop-item-name{font-size:14px;font-weight:500;color:var(--text);}
.shop-item-note{font-size:11px;color:var(--muted);margin-top:2px;}
.shop-row.checked .shop-item-name{color:var(--done);text-decoration:line-through;}
.shop-row.checked .shop-item-note{color:var(--done);}
.shop-empty{padding:28px 16px;text-align:center;color:var(--muted);font-size:13px;}
.shop-extra-add{display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:#FAF8F3;}
.shop-extra-add input{flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:13px;background:#fff;color:var(--text);}
.shop-extra-add input:focus{outline:none;border-color:var(--accent);}
.extra-add-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;-webkit-appearance:none;}
.extra-add-btn:active{background:var(--accent-dark);}
.shop-extra-empty{padding:14px 14px;color:var(--muted);font-size:12px;font-style:italic;}
.extra-del-btn{background:none;border:none;color:var(--muted);font-size:18px;line-height:1;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;}
.extra-del-btn:active{color:#B33;}

.lock-screen{position:fixed;inset:0;background:var(--accent);z-index:200;display:none;align-items:center;justify-content:center;padding:30px;}
.lock-screen.open{display:flex;}
.lock-card{background:#fff;border-radius:14px;padding:28px 22px 22px;max-width:340px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.2);}
.lock-title{font-family:'DM Serif Display',serif;font-size:26px;color:var(--accent);margin-bottom:6px;font-weight:400;}
.lock-sub{font-size:12px;color:var(--muted);margin-bottom:18px;letter-spacing:0.02em;}
.lock-input{width:100%;padding:13px 14px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:15px;text-align:center;background:#fff;color:var(--text);-webkit-appearance:none;}
.lock-input:focus{outline:none;border-color:var(--accent);}
.lock-error{color:#B33;font-size:12px;margin-top:8px;min-height:16px;}
.lock-btn{margin-top:6px;width:100%;background:var(--accent);color:#fff;border:none;padding:13px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;-webkit-appearance:none;}
.lock-btn:active{background:var(--accent-dark);}
.lock-link{display:inline-block;margin-top:14px;font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:'DM Sans',sans-serif;}
.tag-sm{font-size:9px;padding:2px 7px;border-radius:20px;white-space:nowrap;font-weight:600;text-transform:uppercase;letter-spacing:0.03em;}
.t-chicken{background:#E6F1FB;color:#0C447C;}.t-beef{background:#FAECE7;color:#712B13;}.t-pork{background:#FAEEDA;color:#633806;}.t-lamb{background:#FBEAF0;color:#72243E;}.t-fish{background:#E1F5EE;color:#085041;}.t-veg{background:#EAF3DE;color:#27500A;}.t-turkey{background:#F5EEF8;color:#6C3483;}
.cluster-tag{font-size:9px;padding:2px 7px;border-radius:20px;background:var(--pill-bg);color:var(--pill-text);white-space:nowrap;font-weight:600;text-transform:uppercase;letter-spacing:0.03em;}
.meal-section{margin:14px 16px 0;}
.meal-section-header{font-size:10px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:0.08em;padding:7px 12px;border-radius:8px 8px 0 0;background:var(--accent);}
.meal-section-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}
.meal-row{display:flex;align-items:center;padding:11px 12px;border-bottom:1px solid var(--border);gap:10px;}
.meal-row:last-child{border-bottom:none;}
.meal-row-name{font-size:13px;font-weight:500;color:var(--text);flex:1;}
.meal-row.used .meal-row-name{color:var(--done);}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;align-items:flex-end;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-height:75vh;overflow-y:auto;padding-bottom:30px;}
.modal-header{padding:16px 16px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:15px;font-weight:600;}
.modal-close{background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;padding:0 4px;}
.modal-item{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;gap:10px;}
.modal-item:last-child{border-bottom:none;}
.modal-item:active{background:var(--bg);}
.modal-item-name{font-size:14px;font-weight:500;flex:1;}
.modal-item.used-item .modal-item-name{color:var(--done);}
.modal-item-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:#FFF8E8;color:#B8860B;border:1px solid #F0C84A;}
</style>
</head>

<div class="lock-screen" id="lockScreen">
  <div class="lock-card">
    <h2 class="lock-title">Meal Planner</h2>
    <p class="lock-sub">Hint: Boss</p>
    <input type="password" class="lock-input" id="lockInput" autocomplete="off" placeholder="Password">
    <div class="lock-error" id="lockError"></div>
    <button class="lock-btn" id="lockBtn">Unlock</button>
  </div>
</div>

<header>
  <h1>Meal Planner</h1>
  <p>48 dishes · weekly plan · auto shopping list</p>
  <div class="header-row">
    <span class="week-label" id="weekLabel">Week 1</span>
    <button class="gen-btn" onclick="generateWeek()">New week ↻</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('tonight')">Tonight</div>
  <div class="tab" onclick="switchTab('plan')">Week</div>
  <div class="tab" onclick="switchTab('shop')">Shopping</div>
  <div class="tab" onclick="switchTab('meals')">All</div>
</div>

<div class="panel active" id="panel-tonight"><div id="tonightContent"></div></div>
<div class="panel" id="panel-plan"><div id="planContent"></div></div>
<div class="panel" id="panel-shop"><div id="shopContent"></div></div>
<div class="panel" id="panel-meals"><div id="mealsContent"></div></div>

<div class="overlay" id="swapOverlay" onclick="closeSwap(event)">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Swap meal</span><button class="modal-close" onclick="closeSwapDirect()">✕</button></div>
    <div id="swapList"></div>
  </div>
</div>

async function pushMerge(fields){
  try{await setDoc(householdRef,Object.assign({},fields,{updatedAt:serverTimestamp()}),{merge:true});}

}
async function pushReplace(fields){
  try{await setDoc(householdRef,Object.assign({},fields,{updatedAt:serverTimestamp()}));}

}
async function pushUpdate(fields){

// Read any leftover localStorage data so we can seed Firestore on first load if it's empty.
function readLegacyLocalStorage(){
  function read(k,d){try{var v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch(e){return d;}}
  return{
    week:read("mpv4_week",[]),
    recent:read("mpv4_recent",{}),
    weeknum:read("mpv4_weeknum",1),
    shopChecked:read("mpv4_shopchecked",{})
  };

// Parse a quantity string like "500g", "1.2kg", "2 tins", "3 cloves" into {n, unit}.
// Returns null if it can't be summed (e.g. "splash", "to serve", "small bunch", "2-3").
function parseQty(q){
  // require either a bare number, or a number followed by whitespace and a letter-led unit.
  var m=String(q).match(/^(\d+(?:\.\d+)?)(?:\s*([a-zA-Z][a-zA-Z\s]*))?$/);
  if(!m)return null;
  var n=parseFloat(m[1]);
  if(isNaN(n))return null;
  var unit=(m[2]||'').trim().toLowerCase().replace(/s$/,'');
  return{n:n,unit:unit};
}

// Units that don't pluralise — "4 large" not "4 larges", "3 tsp" not "3 tsps".
var NO_PLURAL_UNITS=['large','medium','small','xl','extra large','tsp','tbsp','oz','lb','pt','cm','mm'];

function unitClass(unit){
  if(unit==='g'||unit==='kg')return'weight';
  if(unit==='ml'||unit==='l')return'volume';
  return'count:'+unit;
}

// Combine a list of qty strings into a tidy summed display.
// Falls back to unique-concat when any input can't be parsed.
function mergeQtys(qtys){
  var parsed=qtys.map(parseQty);
  if(parsed.some(function(p){return !p;})){
    var u=[];qtys.forEach(function(q){if(u.indexOf(q)===-1)u.push(q);});
    return u.join(' + ');
  }
  var groups={};
  parsed.forEach(function(p){
    var c=unitClass(p.unit);
    if(!groups[c])groups[c]=[];
    groups[c].push(p);
  });
  var parts=[];
  Object.keys(groups).forEach(function(c){
    var ps=groups[c];
    if(c==='weight'){
      var grams=ps.reduce(function(a,p){return a+(p.unit==='kg'?p.n*1000:p.n);},0);
      parts.push(grams>=1000?(+(grams/1000).toFixed(2))+'kg':grams+'g');
    } else if(c==='volume'){
      var ml=ps.reduce(function(a,p){return a+(p.unit==='l'?p.n*1000:p.n);},0);
      parts.push(ml>=1000?(+(ml/1000).toFixed(2))+'L':ml+'ml');
    } else {
      var n=ps.reduce(function(a,p){return a+p.n;},0);
      var unit=ps[0].unit;
      var label=unit?(' '+(n!==1&&NO_PLURAL_UNITS.indexOf(unit)<0?unit+'s':unit)):'';
      parts.push(n+label);
    }
  });
  return parts.join(' + ');
}

function getShoppingList(){
  var needed={};
  S.week.forEach(function(m,i){
    if(!m||m.skipped||m.done)return;
    var ings=getMealIngredients(m.name);
    ings.forEach(function(ing){
      var key=ing.name.toLowerCase();
      if(!needed[key]){needed[key]={name:ing.name,cat:ing.cat,qtys:[],mealDays:[]};}
      needed[key].qtys.push(ing.qty);
      needed[key].mealDays.push(DAYS[i]);
    });
  });
  var byCat={};
  Object.values(needed).forEach(function(item){
    var c=item.cat||"pantry";
    if(!byCat[c])byCat[c]=[];
    var uniqDays=[];
    item.mealDays.forEach(function(d){if(uniqDays.indexOf(d)===-1)uniqDays.push(d);});
    byCat[c].push({
      name:item.name,
      qty:mergeQtys(item.qtys),
      days:uniqDays.join(', ')
    });
  });
  return byCat;
}

function renderShop(){
  var byCat=getShoppingList();
  var totalCount=0, checkedCount=0;
  Object.values(byCat).forEach(function(items){
    items.forEach(function(it){totalCount++;if(S.shopChecked[it.name.toLowerCase()])checkedCount++;});
  });
  var extraIds=Object.keys(S.extras||{});
  extraIds.forEach(function(id){totalCount++;if(S.extras[id].checked)checkedCount++;});
  var pct=totalCount?Math.round(checkedCount/totalCount*100):0;

  var html='<div class="shop-header"><div class="shop-progress-wrap">';
  html+='<div class="shop-progress-row"><span class="shop-progress-label">Shopping progress</span><span class="shop-progress-pct">'+checkedCount+' / '+totalCount+' · '+pct+'%</span></div>';
  html+='<div class="shop-progress-bar-wrap"><div class="shop-progress-bar" style="width:'+pct+'%"></div></div>';
  html+='<button class="shop-reset" onclick="resetShop()">Reset ticks</button>';
  html+='</div></div>';

  // Always show the extras input + list, even when no meals are planned.
  html+='<div class="shop-section"><div class="shop-section-header">Other</div><div class="shop-section-body">';
  html+='<div class="shop-extra-add"><input id="extraInput" type="text" placeholder="Add anything else (e.g. milk, bin bags)" autocomplete="off" onkeydown="if(event.key===\'Enter\'){event.preventDefault();addExtra();}"><button class="extra-add-btn" onclick="addExtra()">Add</button></div>';
  if(!extraIds.length){
    html+='<div class="shop-extra-empty">Anything that\'s not in a meal — add it here.</div>';
  } else {
    extraIds.sort(function(a,b){return (S.extras[a].name||'').localeCompare(S.extras[b].name||'');});
    extraIds.forEach(function(id){
      var ex=S.extras[id];
      html+='<div class="shop-row'+(ex.checked?' checked':'')+'" data-extra-id="'+id+'">';
      html+='<div class="shop-box" onclick="toggleExtra(\''+id+'\')"><svg class="shop-tick" viewBox="0 0 14 14" fill="none"><polyline points="2,7 5.5,11 12,3" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';
      html+='<div class="shop-item-body" onclick="toggleExtra(\''+id+'\')"><div class="shop-item-name">'+escapeHtml(ex.name||'')+'</div></div>';
      html+='<button class="extra-del-btn" onclick="removeExtra(\''+id+'\')" title="Remove">×</button>';
      html+='</div>';
    });
  }
  html+='</div></div>';

  if(totalCount-extraIds.length===0){
    html+='<div class="shop-empty">No meal ingredients this week. Generate a new week ↻</div>';
  } else {
    CATS.forEach(function(cat){
      var items=byCat[cat.key];
      if(!items||!items.length)return;
      items.sort(function(a,b){return a.name.localeCompare(b.name);});
      html+='<div class="shop-section"><div class="shop-section-header">'+cat.label+'</div><div class="shop-section-body">';
      items.forEach(function(it){
        var isChecked=S.shopChecked[it.name.toLowerCase()];
        html+='<div class="shop-row'+(isChecked?' checked':'')+'" onclick="toggleShop(this,\''+escQ(it.name)+'\')">';
        html+='<div class="shop-box"><svg class="shop-tick" viewBox="0 0 14 14" fill="none"><polyline points="2,7 5.5,11 12,3" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';
        html+='<div class="shop-item-body"><div class="shop-item-name">'+it.name+'</div><div class="shop-item-note">'+it.qty+' — '+it.days+'</div></div>';
        html+='</div>';
      });
      html+='</div></div>';
    });
  }
  document.getElementById("shopContent").innerHTML=html;
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c];});}

function addExtra(){
  var inp=document.getElementById("extraInput");
  if(!inp)return;
  var name=(inp.value||'').trim();
  if(!name)return;
  var id='x'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  S.extras[id]={name:name,checked:false};
  inp.value='';
  renderShop();
  pushMerge({extras:{[id]:{name:name,checked:false}}});
}

function toggleExtra(id){
  var ex=S.extras[id];
  if(!ex)return;
  ex.checked=!ex.checked;
  renderShop();
  pushMerge({extras:{[id]:{name:ex.name,checked:ex.checked}}});
}

function removeExtra(id){
  delete S.extras[id];
  renderShop();
  pushMerge({extras:{[id]:deleteField()}});
}

function toggleShop(el,name){
  var k=name.toLowerCase();
  if(S.shopChecked[k]){
    delete S.shopChecked[k];
    el.classList.remove('checked');
    pushMerge({shopChecked:{[k]:deleteField()}});
  } else {
    S.shopChecked[k]=true;
    el.classList.add('checked');
    pushMerge({shopChecked:{[k]:true}});
  }
  // update progress bar without full re-render (keeps scroll position)
  var byCat=getShoppingList();
  var totalCount=0,checkedCount=0;
  Object.values(byCat).forEach(function(items){items.forEach(function(it){totalCount++;if(S.shopChecked[it.name.toLowerCase()])checkedCount++;});});
  var pct=totalCount?Math.round(checkedCount/totalCount*100):0;
  var bar=document.querySelector('.shop-progress-bar');
  var lbl=document.querySelector('.shop-progress-pct');
  if(bar)bar.style.width=pct+'%';
  if(lbl)lbl.textContent=checkedCount+' / '+totalCount+' · '+pct+'%';
}

function resetShop(){
  if(!confirm('Reset all ticks?'))return;
  S.shopChecked={};
  Object.keys(S.extras||{}).forEach(function(id){if(S.extras[id])S.extras[id].checked=false;});
  renderShop();
  pushUpdate({shopChecked:{},extras:S.extras||{}});
}

function generateWeek(){
  // Preserve pinned slots — they keep their day index across regenerations.
  var pinnedAt={};
  S.week.forEach(function(m,i){if(m&&m.pinned)pinnedAt[i]=m;});
  var pinnedNames={};
  Object.values(pinnedAt).forEach(function(m){pinnedNames[m.name]=true;});
  var slotsNeeded=7-Object.keys(pinnedAt).length;

  var cutoff=Date.now()-(21*24*60*60*1000);
  var avail=MEALS.filter(function(m){
    if(pinnedNames[m.name])return false;
    var t=S.recent[m.name];return !t||t<cutoff;
  });
  if(avail.length<slotsNeeded){
    Object.entries(S.recent).sort(function(a,b){return a[1]-b[1];}).slice(0,slotsNeeded-avail.length).forEach(function(e){delete S.recent[e[0]];});
    avail=MEALS.filter(function(m){
      if(pinnedNames[m.name])return false;
      var t=S.recent[m.name];return !t||t<cutoff;
    });
  }
  var pools={chicken:[],beef:[],pork:[],other:[]};
  avail.forEach(function(m){
    if(m.protein==="chicken")pools.chicken.push(m);
    else if(m.protein==="beef")pools.beef.push(m);
    else if(m.protein==="pork")pools.pork.push(m);
    else pools.other.push(m);
  });
  [pools.chicken,pools.beef,pools.pork,pools.other].forEach(shuffle);
  // Adjust quotas proportionally to slotsNeeded.
  var quotas=slotsNeeded>=7
    ?[{p:pools.chicken,n:3},{p:pools.beef,n:2},{p:pools.pork,n:1},{p:pools.other.concat(pools.chicken.slice(3)).concat(pools.beef.slice(2)),n:1}]
    :[{p:pools.chicken,n:Math.min(3,Math.ceil(slotsNeeded*3/7))},{p:pools.beef,n:Math.min(2,Math.ceil(slotsNeeded*2/7))},{p:pools.pork,n:Math.min(1,Math.ceil(slotsNeeded/7))},{p:pools.other,n:1}];
  var picks=[];
  quotas.forEach(function(t){for(var i=0;i<t.n&&t.p.length&&picks.length<slotsNeeded;i++)picks.push(t.p.shift());});
  var rest=avail.filter(function(m){return !picks.includes(m);});shuffle(rest);
  while(picks.length<slotsNeeded&&rest.length)picks.push(rest.shift());
  picks=picks.slice(0,slotsNeeded);
  var ord={chicken:0,beef:1,pork:2,lamb:3,turkey:4,fish:5,veg:6};
  picks.sort(function(a,b){return(ord[a.protein]||6)-(ord[b.protein]||6);});
  var pickQueue=picks.map(function(m){return{name:m.name,protein:m.protein,done:false};});

  // Build the final 7-day week: pinned meals stay put, picks fill the gaps.
  var wp=[];
  for(var i=0;i<7;i++){
    if(pinnedAt[i]){
      wp.push({name:pinnedAt[i].name,protein:pinnedAt[i].protein,done:false,pinned:true});
    } else {
      wp.push(pickQueue.shift());
    }
  }
  wp.forEach(function(m){if(m)S.recent[m.name]=Date.now();});
  S.weeknum++;S.week=wp;
  S.shopChecked={};
  renderAll();switchTab("tonight");
  pushReplace({week:S.week,recent:S.recent,weeknum:S.weeknum,shopChecked:{}});
}

function openSwap(idx){
  swapIdx=idx;
  var cur=S.week[idx];
  var cutoff=Date.now()-(21*24*60*60*1000);
  var html='';
  MEALS.forEach(function(m){
    if(m.name===cur.name)return;
    var used=S.recent[m.name]&&S.recent[m.name]>=cutoff;
    html+='<div class="modal-item'+(used?' used-item':'')+'" onclick="doSwap(\''+escQ(m.name)+'\',\''+m.protein+'\')">';
    html+='<span class="modal-item-name">'+m.name+'</span>';
    if(used)html+='<span class="modal-item-badge">recent</span>';
    html+='<span class="tag-sm t-'+m.protein+'">'+m.protein+'</span></div>';
  });
  document.getElementById("swapList").innerHTML=html;
  document.getElementById("swapOverlay").classList.add("open");
}

function doSwap(name,protein){
  S.week[swapIdx]={name:name,protein:protein,done:false};
  S.recent[name]=Date.now();
  closeSwapDirect();renderAll();
  pushMerge({week:S.week,recent:S.recent});
}

function closeSwap(e){if(e.target===document.getElementById("swapOverlay"))closeSwapDirect();}
function closeSwapDirect(){document.getElementById("swapOverlay").classList.remove("open");}

function renderMeals(){
  var cutoff=Date.now()-(21*24*60*60*1000),html='';
  SECS.forEach(function(sec){
    var meals=MEALS.filter(function(m){return m.cat===sec.key;});
    if(!meals.length)return;
    html+='<div class="meal-section"><div class="meal-section-header">'+sec.label+'</div><div class="meal-section-body">';
    meals.forEach(function(m){
      var used=S.recent[m.name]&&S.recent[m.name]>=cutoff;
      html+='<div class="meal-row'+(used?' used':'')+'"><span class="meal-row-name">'+m.name+'</span>';
      if(used)html+='<span class="modal-item-badge">recent</span>';
      html+='<span class="tag-sm t-'+m.protein+'">'+m.protein+'</span></div>';
    });
    html+='</div></div>';
  });
  document.getElementById("mealsContent").innerHTML=html;
}

function switchTab(id){
  var ids=['tonight','plan','shop','meals'];
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',ids[i]===id);});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('panel-'+id).classList.add('active');
  window.scrollTo(0,0);
}

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function escQ(s){return s.replace(/'/g,"\\'");}

function renderConnecting(){
  document.getElementById("tonightContent").innerHTML='<div class="tonight-hero"><div class="tonight-inner"><div class="tonight-day">Connecting…</div><div class="tonight-meal">Loading your week</div></div></div>';
  document.getElementById("planContent").innerHTML='';
  document.getElementById("shopContent").innerHTML='';
  document.getElementById("mealsContent").innerHTML='';
}
function renderAll(){
  if(!firstSnapshot){renderConnecting();return;}
  renderTonight();renderPlan();renderShop();renderMeals();
}

// expose handlers for inline onclick attributes (module scope is not global)
window.generateWeek=generateWeek;
window.switchTab=switchTab;
window.markDone=markDone;
window.skipMeal=skipMeal;
window.unskipMeal=unskipMeal;
window.togglePin=togglePin;
window.openSwap=openSwap;
window.closeSwap=closeSwap;
window.closeSwapDirect=closeSwapDirect;
window.doSwap=doSwap;
window.toggleShop=toggleShop;
window.resetShop=resetShop;
window.addExtra=addExtra;
window.toggleExtra=toggleExtra;
window.removeExtra=removeExtra;

// ---- password gate ----
var APP_PASSWORD="HoggyBoos";
var UNLOCK_KEY="mpv4_unlocked";

function isUnlocked(){
  try{return localStorage.getItem(UNLOCK_KEY)==="1";}catch(e){return false;}
}

function showLockScreen(){
  var screen=document.getElementById("lockScreen");
  var inp=document.getElementById("lockInput");
  var err=document.getElementById("lockError");
  var btn=document.getElementById("lockBtn");
  screen.classList.add("open");
  function attempt(){
    err.textContent="";
    if(inp.value===APP_PASSWORD){
      try{localStorage.setItem(UNLOCK_KEY,"1");}catch(e){}
      screen.classList.remove("open");
      bootApp();
    } else {
      err.textContent="Nope. Hint: Boss.";
      inp.value="";
      inp.focus();
    }
  }
  btn.onclick=attempt;
  inp.onkeydown=function(e){if(e.key==="Enter"){e.preventDefault();attempt();}};
  setTimeout(function(){inp.focus();},80);
}

// ---- auth + live sync ----
var seedAttempted=false;

async function attachListener(){
  onSnapshot(householdRef,async function(snap){
    if(snap.exists()){
      var d=snap.data();
      S.week=d.week||[];
      S.recent=d.recent||{};
      S.weeknum=d.weeknum||1;
      S.shopChecked=d.shopChecked||{};
      S.extras=d.extras||{};
      firstSnapshot=true;
      seedAttempted=true; // doc exists; never seed over it
      clearConnWarn();
      renderAll();
      return;
    }
    // Snapshot says doc doesn't exist. If this is just an empty offline cache
    // on a fresh device, the next snapshot from the server will tell us the
    // truth. Don't seed until we have server confirmation.
    if(snap.metadata.fromCache)return;
    if(seedAttempted)return;
    seedAttempted=true;
    // Server confirms household doc doesn't exist — create it with empty defaults.
    // (We deliberately do NOT migrate from this device's localStorage anymore;
    // that risked a second device wiping good Firestore data with empty state.)
    try{
      await setDoc(householdRef,{
        week:[],recent:{},weeknum:1,shopChecked:{},extras:{},
        updatedAt:serverTimestamp()
      });
    }catch(e){
      showConnWarn("Couldn't create the household doc. "+(e.message||e));
    }
  },function(err){
    showConnWarn("Live sync failed. "+(err.message||err));
  });
}

// One-shot recovery hook. Run from DevTools console on a device that still has
// good localStorage: __forceRestore()
window.__forceRestore=async function(){
  var seed=readLegacyLocalStorage();
  if(!seed.week||!seed.week.length){
    console.log("No mpv4_* localStorage data on this device to restore.");
    return;
  }
  console.log("Restoring from localStorage:",seed);
  try{
    await setDoc(householdRef,{
      week:seed.week,recent:seed.recent,weeknum:seed.weeknum,
      shopChecked:seed.shopChecked,extras:S.extras||{},
      updatedAt:serverTimestamp()
    });
    console.log("Restored. Other devices will sync within a second.");
  }catch(e){
    console.error("Restore failed:",e);
  }
};

// Subtle "lock again" link on the lock card (for handing the laptop back).
window.__lockApp=function(){
  try{localStorage.removeItem(UNLOCK_KEY);}catch(e){}
  location.reload();
};

function bootApp(){
  renderConnecting();
  onAuthStateChanged(fbAuth,async function(user){
    if(user){attachListener();return;}
    try{await signInAnonymously(fbAuth);}
    catch(e){showConnWarn("Sign-in failed. "+(e.message||e));}
  });
}

// Decide on load: locked or straight in.
if(isUnlocked())bootApp();
else showLockScreen();
</script>
